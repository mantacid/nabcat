### ENV: contains values that define default behavior.
env:
  cat-dir: "~/Pictures/Cats/"
  do-copy: true
  verbose: false
  return-found: true

### INTEGRATIONS: organized by their purpose. Define commands here that will
### get referenced in the next section. Command arguments will get appended
### to the end of these strings. DO NOT QUOTE THESE STRINGS.
integrations:
  clipboard:
    - &x11 xsel --selection --clipboard -t image/png -i 
    - &wayland wl-copy < 
  viewer:
    - &viu viu -w 30
  picker:
    - &gum gum filter

### PROGRAMS: Control which backends are used for each function.
programs:
  clipboard: *wayland
  viewer: *viu
  picker: *gum

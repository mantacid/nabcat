# LOCATIONS: define alternate locations so you don't have to comment them out, and can just specify which one you want.
locations:
  - &defaultlocation "~/Pictures/Cats/"

### ENV: contains values that define default behavior.
env:
  cat-dir: *defaultlocation
  do-copy: true
  verbose: false
  return-found: true

### INTEGRATIONS: organized by their purpose. Define commands here that will
### get referenced in the next section. Command arguments will get appended
### to the end of these strings. DO NOT QUOTE THESE STRINGS.
backend-defs:
  clipboard:
    - &x11 xsel --selection --clipboard -t image/png -i 
    - &wayland wl-copy < 
  viewer:
    - &viu viu -w 30
  picker:
    - &gum gum filter
    - &fzf fzf --style=full --preview="icat -m 24bit -w 50 $(echo $env_cat_dir){}"

### PROGRAMS: Control which backends are used for each function.
backends:
  clipboard: *wayland
  viewer: *viu
  picker: *fzf
